<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preregistro · Pasarela OI 2026 · SHYLA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0a0a;
    color: #f0ebe5;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .hero {
    text-align: center;
    padding: 3.5rem 2rem 2.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: #b84444;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    font-weight: 500;
  }

  .logo-wordmark {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.55em;
    color: #f0ebe5;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 400;
    line-height: 1.12;
    color: #f5f0ec;
    margin-bottom: 0.5rem;
  }

  .hero-title em {
    font-style: italic;
    color: #d4b0a0;
  }

  .hero-sub {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8a7870;
    margin-top: 0.75rem;
  }

  .meta-strip {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 0.5px solid rgba(255,255,255,0.08);
  }

  .meta-item { text-align: center; }

  .meta-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #7a6a64;
    display: block;
    margin-bottom: 4px;
  }

  .meta-value {
    font-size: 11px;
    color: #b84444;
    letter-spacing: 0.08em;
  }

  .meta-sep {
    width: 0.5px;
    height: 28px;
    background: rgba(255,255,255,0.1);
  }

  .form-wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
  }

  .form-intro {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
    color: #b0a098;
    text-align: center;
    margin-bottom: 2.5rem;
    line-height: 1.65;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .field { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #a09088;
    margin-bottom: 7px;
    font-weight: 500;
  }

  input[type="text"],
  input[type="tel"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.18);
    color: #f0ebe5;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 0.75rem 0.9rem;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: rgba(184,68,68,0.6);
    background: rgba(184,68,68,0.05);
  }

  input::placeholder, textarea::placeholder { color: #5a5050; }

  select option { background: #1a1210; color: #f0ebe5; }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
    cursor: pointer;
  }

  .ticket-section {
    border: 0.5px dashed rgba(255,255,255,0.15);
    border-radius: 2px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    background: rgba(255,255,255,0.02);
  }

  .ticket-title {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #a09088;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .ticket-note {
    font-size: 11px;
    color: #7a7070;
    line-height: 1.55;
    margin-top: 0.75rem;
    font-style: italic;
  }

  .upload-zone {
    border: 0.5px dashed rgba(184,68,68,0.5);
    border-radius: 2px;
    padding: 1.75rem;
    text-align: center;
    cursor: pointer;
    background: rgba(184,68,68,0.04);
    position: relative;
    transition: background 0.2s;
    margin-top: 1rem;
  }

  .upload-zone:hover { background: rgba(184,68,68,0.08); }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 22px;
    color: #a06060;
    margin-bottom: 8px;
    display: block;
  }

  .upload-text {
    font-size: 11px;
    color: #9a8880;
    letter-spacing: 0.08em;
  }

  .upload-preview {
    font-size: 11px;
    color: #b84444;
    margin-top: 8px;
    display: none;
  }

  .img-preview {
    max-width: 100%;
    max-height: 120px;
    border-radius: 2px;
    margin-top: 10px;
    border: 0.5px solid rgba(255,255,255,0.1);
    display: none;
  }

  .btn-submit {
    width: 100%;
    background: #8f3232;
    color: #f5f0ec;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 1.1rem;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 2rem;
    transition: background 0.2s, opacity 0.2s;
  }

  .btn-submit:hover { background: #7a2828; }
  .btn-submit:disabled { background: #2e1a1a; color: #6a5050; cursor: not-allowed; }
  .btn-submit.loading { opacity: 0.6; pointer-events: none; }

  .form-note {
    font-size: 11px;
    color: #7a7070;
    text-align: center;
    margin-top: 1.5rem;
    line-height: 1.7;
    letter-spacing: 0.03em;
  }

  .form-note a { color: #b84444; text-decoration: none; }

  .field-error {
    font-size: 10px;
    color: #c06060;
    margin-top: 4px;
    display: none;
  }

  .field-error.show { display: block; }

  #submit-error {
    font-size: 11px;
    color: #c06060;
    text-align: center;
    display: none;
    margin-top: 1rem;
    line-height: 1.5;
  }

  /* Confirmation */
  #confirm-screen {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    max-width: 440px;
    margin: 0 auto;
  }

  .confirm-ring {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 0.5px solid rgba(184,68,68,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    font-size: 20px;
    color: #b84444;
  }

  .confirm-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: #f5f0ec;
    margin-bottom: 1rem;
  }

  .confirm-body {
    font-size: 13px;
    color: #a09088;
    line-height: 1.75;
  }

  .confirm-body strong { color: #d4b0a0; font-weight: 400; }

  .confirm-tag {
    display: inline-block;
    margin-top: 2rem;
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #5a5050;
  }

  @media (max-width: 480px) {
    .field-row { grid-template-columns: 1fr; }
    .meta-strip { gap: 1.2rem; }
  }
</style>
</head>
<body>
<div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem;">
  <p style="font-size:9px; letter-spacing:0.4em; color:#b84444; text-transform:uppercase; margin-bottom:1.5rem; font-weight:500;">Pasarela Otoño · Invierno 2026</p>
  <p style="font-size:13px; font-weight:400; letter-spacing:0.55em; color:#f0ebe5; margin-bottom:2rem; text-transform:uppercase;">S &nbsp; H &nbsp; Y &nbsp; L &nbsp; A</p>
  <h1 style="font-family:'Playfair Display',serif; font-size:clamp(1.8rem,5vw,2.8rem); font-weight:400; color:#f5f0ec; line-height:1.2; margin-bottom:1.5rem;">
    Gracias por participar
  </h1>
  <p style="font-family:'Playfair Display',serif; font-size:1.1rem; font-style:italic; color:#c8a090; margin-bottom:2rem; line-height:1.7;">
    Las convocatorias están cerradas.
  </p>
  <div style="width:40px; height:0.5px; background:#8f3232; margin:0 auto 2rem;"></div>
  <p style="font-size:13px; color:#a09088; letter-spacing:0.08em; line-height:1.8;">
    Nos vemos en el evento.
  </p>
  <p style="font-size:9px; letter-spacing:0.2em; color:#5a5050; text-transform:uppercase; margin-top:3rem;">
    29 de julio · Gran Hotel Ciudad de México
  </p>
</div>
</body>
</html>
